<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Generador de Señales de Audio</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --panel: #0d1520;
    --border: #1a2f4a;
    --sig1: #00f5c4;
    --sig2: #ff5e5b;
    --mix: #a78bfa;
    --text: #c8dff0;
    --dim: #4a6a85;
    --glow1: rgba(0,245,196,0.25);
    --glow2: rgba(255,94,91,0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    padding: 1rem;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,196,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,196,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 500px;
    margin: 0 auto;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(1.1rem, 5vw, 1.6rem);
    letter-spacing: 0.15em;
    text-align: center;
    color: var(--sig1);
    text-shadow: 0 0 20px var(--glow1);
    padding: 1rem 0 0.3rem;
  }

  .subtitle {
    text-align: center;
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  /* Signal cards */
  .signal-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.2rem;
    margin-bottom: 1rem;
    position: relative;
    overflow: hidden;
  }

  .signal-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .signal-card.s1::before { background: linear-gradient(90deg, transparent, var(--sig1), transparent); }
  .signal-card.s2::before { background: linear-gradient(90deg, transparent, var(--sig2), transparent); }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }

  .signal-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.2em;
  }

  .s1 .signal-label { color: var(--sig1); }
  .s2 .signal-label { color: var(--sig2); }

  .freq-display {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .s1 .freq-display { color: var(--sig1); text-shadow: 0 0 15px var(--glow1); }
  .s2 .freq-display { color: var(--sig2); text-shadow: 0 0 15px var(--glow2); }

  .freq-unit {
    font-size: 0.65rem;
    color: var(--dim);
    margin-left: 2px;
  }

  /* Slider */
  .slider-wrap {
    position: relative;
    margin: 0.5rem 0;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  .s1 input[type=range] {
    background: linear-gradient(90deg, var(--sig1) var(--pct1, 0%), var(--border) var(--pct1, 0%));
  }

  .s2 input[type=range] {
    background: linear-gradient(90deg, var(--sig2) var(--pct2, 0%), var(--border) var(--pct2, 0%));
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid var(--bg);
    box-shadow: 0 0 10px currentColor;
  }

  .s1 input[type=range]::-webkit-slider-thumb { background: var(--sig1); color: var(--sig1); }
  .s2 input[type=range]::-webkit-slider-thumb { background: var(--sig2); color: var(--sig2); }

  .slider-ticks {
    display: flex;
    justify-content: space-between;
    font-size: 0.55rem;
    color: var(--dim);
    margin-top: 4px;
    padding: 0 2px;
  }

  /* Toggle button */
  .toggle-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--dim);
  }

  .toggle-btn .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--dim);
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .toggle-btn.active { color: inherit; border-color: currentColor; }
  .s1 .toggle-btn.active { color: var(--sig1); box-shadow: 0 0 10px var(--glow1); }
  .s1 .toggle-btn.active .dot { background: var(--sig1); box-shadow: 0 0 8px var(--sig1); }
  .s2 .toggle-btn.active { color: var(--sig2); box-shadow: 0 0 10px var(--glow2); }
  .s2 .toggle-btn.active .dot { background: var(--sig2); box-shadow: 0 0 8px var(--sig2); }

  /* Mix panel */
  .mix-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.2rem;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .mix-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    color: var(--mix);
    letter-spacing: 0.15em;
    text-shadow: 0 0 10px rgba(167,139,250,0.4);
  }

  .mix-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    border: 1px solid rgba(167,139,250,0.3);
    border-radius: 4px;
    padding: 8px 18px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--dim);
  }

  .mix-btn .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--dim);
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .mix-btn.active {
    color: var(--mix);
    border-color: var(--mix);
    box-shadow: 0 0 12px rgba(167,139,250,0.3);
  }

  .mix-btn.active .dot {
    background: var(--mix);
    box-shadow: 0 0 8px var(--mix);
  }

  /* Visualizer */
  .viz-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.2rem;
    margin-bottom: 1rem;
  }

  .viz-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.8rem;
  }

  .viz-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--text);
  }

  .mic-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--dim);
  }

  .mic-btn.active {
    color: #facc15;
    border-color: #facc15;
    box-shadow: 0 0 10px rgba(250,204,21,0.25);
  }

  .mic-btn .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--dim);
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .mic-btn.active .dot {
    background: #facc15;
    box-shadow: 0 0 8px #facc15;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  canvas#vizCanvas {
    width: 100%;
    height: 180px;
    display: block;
    border-radius: 4px;
    background: #050a0e;
    border: 1px solid var(--border);
  }

  .status-bar {
    display: flex;
    justify-content: space-between;
    font-size: 0.6rem;
    color: var(--dim);
    margin-top: 0.5rem;
    letter-spacing: 0.1em;
  }

  .status-val { color: var(--sig1); }

  /* Waveform mini previews */
  .wave-preview {
    height: 30px;
    margin-top: 0.6rem;
    opacity: 0.6;
  }

  canvas.wave-preview { width: 100%; display: block; border-radius: 2px; }

  /* Frequency text input */
  .freq-input-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 0.6rem;
  }

  .freq-input {
    background: #050a0e;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Orbitron', sans-serif;
    font-size: 0.85rem;
    width: 90px;
    padding: 5px 8px;
    text-align: right;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
  }
  .freq-input::-webkit-inner-spin-button,
  .freq-input::-webkit-outer-spin-button { -webkit-appearance: none; }

  .s1 .freq-input:focus { border-color: var(--sig1); box-shadow: 0 0 8px var(--glow1); }
  .s2 .freq-input:focus { border-color: var(--sig2); box-shadow: 0 0 8px var(--glow2); }

  .freq-input-unit {
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 0.1em;
  }

  .freq-input-hint {
    font-size: 0.55rem;
    color: var(--dim);
    margin-left: auto;
    letter-spacing: 0.05em;
  }

  .footer {
    text-align: center;
    font-size: 0.55rem;
    color: var(--dim);
    letter-spacing: 0.15em;
    padding: 0.5rem 0 1.5rem;
    opacity: 0.5;
  }
</style>
</head>
<body>
<div class="container">
  <h1>AUDIO SIGNAL GEN</h1>
  <p class="subtitle">Dual Sine Wave Generator + Mic Analyzer</p>

  <!-- Signal 1 -->
  <div class="signal-card s1">
    <div class="card-header">
      <div>
        <div class="signal-label">SEÑAL — A</div>
        <div class="freq-display">
          <span id="f1val">440</span><span class="freq-unit">Hz</span>
        </div>
      </div>
      <button class="toggle-btn" id="btn1" onclick="toggleSignal(1)">
        <span class="dot"></span><span id="lbl1">OFF</span>
      </button>
    </div>
    <div class="slider-wrap">
      <input type="range" id="slider1" min="20" max="20000" value="440" step="1"
        oninput="updateFreq(1, this.value)" style="--pct1:2%">
    </div>
    <div class="slider-ticks">
      <span>20</span><span>100</span><span>500</span><span>1k</span><span>5k</span><span>10k</span><span>20k</span>
    </div>
    <div class="freq-input-wrap">
      <input class="freq-input" id="input1" type="number" min="20" max="20000" value="440"
        onchange="setFreqFromInput(1)" oninput="setFreqFromInput(1)" placeholder="Hz">
      <span class="freq-input-unit">Hz</span>
      <span class="freq-input-hint">20 – 20 000</span>
    </div>
    <canvas class="wave-preview" id="wave1" height="30"></canvas>
  </div>

  <!-- Signal 2 -->
  <div class="signal-card s2">
    <div class="card-header">
      <div>
        <div class="signal-label">SEÑAL — B</div>
        <div class="freq-display">
          <span id="f2val">1000</span><span class="freq-unit">Hz</span>
        </div>
      </div>
      <button class="toggle-btn" id="btn2" onclick="toggleSignal(2)">
        <span class="dot"></span><span id="lbl2">OFF</span>
      </button>
    </div>
    <div class="slider-wrap">
      <input type="range" id="slider2" min="20" max="20000" value="1000" step="1"
        oninput="updateFreq(2, this.value)" style="--pct2:5%">
    </div>
    <div class="slider-ticks">
      <span>20</span><span>100</span><span>500</span><span>1k</span><span>5k</span><span>10k</span><span>20k</span>
    </div>
    <div class="freq-input-wrap">
      <input class="freq-input" id="input2" type="number" min="20" max="20000" value="1000"
        onchange="setFreqFromInput(2)" oninput="setFreqFromInput(2)" placeholder="Hz">
      <span class="freq-input-unit">Hz</span>
      <span class="freq-input-hint">20 – 20 000</span>
    </div>
    <canvas class="wave-preview" id="wave2" height="30"></canvas>
  </div>

  <!-- Mix -->
  <div class="mix-panel">
    <div>
      <div class="mix-label">MIX A + B</div>
      <div style="font-size:0.6rem; color:var(--dim); margin-top:3px;">Reproduce ambas señales</div>
    </div>
    <button class="mix-btn" id="btnMix" onclick="toggleMix()">
      <span class="dot"></span><span id="lblMix">OFF</span>
    </button>
  </div>

  <!-- Microphone Visualizer -->
  <div class="viz-panel">
    <div class="viz-header">
      <div class="viz-title">🎙 MICRÓFONO — FORMA DE ONDA</div>
      <button class="mic-btn" id="micBtn" onclick="toggleMic()">
        <span class="dot"></span><span id="micLbl">ACTIVAR MIC</span>
      </button>
    </div>
    <canvas id="vizCanvas"></canvas>
    <div class="status-bar">
      <span>PICO: <span class="status-val" id="peakVal">— </span></span>
      <span>RMS: <span class="status-val" id="rmsVal">—</span></span>
      <span>DC: <span class="status-val" id="dcVal">—</span></span>
    </div>
  </div>

  <div class="footer">AUDIO SIGNAL GENERATOR v1.0 · WEB AUDIO API</div>
</div>

<script>
// ── Audio context ──────────────────────────────────────────────
let ctx;
function getCtx() {
  if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  return ctx;
}

// ── Oscillators ────────────────────────────────────────────────
const osc = { 1: null, 2: null };
const gain = { 1: null, 2: null };
const active = { 1: false, 2: false, mix: false };
let freq = { 1: 440, 2: 1000 };

function createOsc(n) {
  const ac = getCtx();
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = 'sine';
  o.frequency.value = freq[n];
  g.gain.value = 0.4;
  o.connect(g);
  g.connect(ac.destination);
  o.start();
  osc[n] = o;
  gain[n] = g;
}

function destroyOsc(n) {
  if (osc[n]) { try { osc[n].stop(); } catch(e){} osc[n] = null; gain[n] = null; }
}

function toggleSignal(n) {
  // When toggling individual, turn off mix
  if (active.mix) {
    active.mix = false;
    updateMixBtn();
    [1,2].forEach(k => { if (active[k]) destroyOsc(k); active[k] = false; });
  }

  active[n] = !active[n];
  if (active[n]) createOsc(n);
  else destroyOsc(n);

  const btn = document.getElementById('btn' + n);
  const lbl = document.getElementById('lbl' + n);
  btn.classList.toggle('active', active[n]);
  lbl.textContent = active[n] ? 'ON' : 'OFF';
}

function toggleMix() {
  active.mix = !active.mix;

  // Turn off individual if active
  if (active.mix) {
    [1,2].forEach(n => { if (active[n]) { destroyOsc(n); active[n] = false; } });
    document.getElementById('btn1').classList.remove('active');
    document.getElementById('lbl1').textContent = 'OFF';
    document.getElementById('btn2').classList.remove('active');
    document.getElementById('lbl2').textContent = 'OFF';
    createOsc(1); active[1] = true;
    createOsc(2); active[2] = true;
  } else {
    [1,2].forEach(n => { destroyOsc(n); active[n] = false; });
  }
  updateMixBtn();
}

function updateMixBtn() {
  const btn = document.getElementById('btnMix');
  const lbl = document.getElementById('lblMix');
  btn.classList.toggle('active', active.mix);
  lbl.textContent = active.mix ? 'ON' : 'OFF';
}

function setFreqFromInput(n) {
  const input = document.getElementById('input' + n);
  let val = parseInt(input.value);
  if (isNaN(val)) return;
  val = Math.max(20, Math.min(20000, val));
  document.getElementById('slider' + n).value = val;
  updateFreq(n, val);
}

function updateFreq(n, val) {
  val = parseInt(val);
  freq[n] = val;
  document.getElementById('f' + n + 'val').textContent = val >= 1000 ? (val/1000).toFixed(val%1000===0?0:1)+'k' : val;

  // Sync text input
  document.getElementById('input' + n).value = val;

  // Update slider gradient
  const slider = document.getElementById('slider' + n);
  const pct = ((Math.log(val) - Math.log(20)) / (Math.log(20000) - Math.log(20)) * 100).toFixed(1);
  slider.style.setProperty('--pct' + n, pct + '%');

  if (osc[n]) osc[n].frequency.setTargetAtTime(val, getCtx().currentTime, 0.01);
  drawWave(n);
}

// ── Wave previews ──────────────────────────────────────────────
function drawWave(n) {
  const canvas = document.getElementById('wave' + n);
  const c = canvas.getContext('2d');
  const W = canvas.offsetWidth || 300;
  canvas.width = W; canvas.height = 30;
  c.clearRect(0, 0, W, 30);
  const color = n === 1 ? '#00f5c4' : '#ff5e5b';
  c.strokeStyle = color;
  c.lineWidth = 1.5;
  c.globalAlpha = 0.8;
  c.beginPath();
  const cycles = Math.min(8, Math.max(1, freq[n] / 200));
  for (let x = 0; x < W; x++) {
    const t = (x / W) * cycles * Math.PI * 2;
    const y = 15 + Math.sin(t) * 11;
    x === 0 ? c.moveTo(x, y) : c.lineTo(x, y);
  }
  c.stroke();
}

// ── Microphone & Visualizer ────────────────────────────────────
let micStream = null;
let analyser = null;
let micActive = false;
let animId = null;
let micSource = null;

async function toggleMic() {
  if (micActive) {
    stopMic();
  } else {
    await startMic();
  }
}

async function startMic() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    const ac = getCtx();
    micSource = ac.createMediaStreamSource(micStream);
    analyser = ac.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.8;
    micSource.connect(analyser);
    micActive = true;
    document.getElementById('micBtn').classList.add('active');
    document.getElementById('micLbl').textContent = 'MIC ON';
    drawViz();
  } catch(e) {
    alert('No se pudo acceder al micrófono: ' + e.message);
  }
}

function stopMic() {
  if (micStream) micStream.getTracks().forEach(t => t.stop());
  if (micSource) micSource.disconnect();
  if (animId) cancelAnimationFrame(animId);
  micStream = null; analyser = null; micSource = null; micActive = false; animId = null;
  document.getElementById('micBtn').classList.remove('active');
  document.getElementById('micLbl').textContent = 'ACTIVAR MIC';
  clearViz();
}

function clearViz() {
  const canvas = document.getElementById('vizCanvas');
  const c = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth || 460;
  canvas.height = 150;
  const W = canvas.width, H = canvas.height;
  c.fillStyle = '#050a0e';
  c.fillRect(0, 0, W, H);
  // Draw flat center line
  c.strokeStyle = 'rgba(0,245,196,0.15)';
  c.lineWidth = 1;
  c.setLineDash([4, 6]);
  c.beginPath(); c.moveTo(0, H/2); c.lineTo(W, H/2); c.stroke();
  c.setLineDash([]);
  document.getElementById('peakVal').textContent = '—';
  document.getElementById('rmsVal').textContent = '—';
  document.getElementById('dcVal').textContent = '—';
}

function drawViz() {
  const canvas = document.getElementById('vizCanvas');
  canvas.width = canvas.offsetWidth || 460;
  canvas.height = 150;
  const c = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // Use a larger fftSize for more time-domain resolution
  analyser.fftSize = 4096;
  analyser.smoothingTimeConstant = 0.0;
  const bufLen = analyser.fftSize;
  const timeData = new Float32Array(bufLen);

  // Scrolling waveform buffer
  const history = new Float32Array(W);

  function draw() {
    animId = requestAnimationFrame(draw);
    analyser.getFloatTimeDomainData(timeData);

    // ── Background ──
    c.fillStyle = '#050a0e';
    c.fillRect(0, 0, W, H);

    // ── Grid lines ──
    c.strokeStyle = 'rgba(26,47,74,0.6)';
    c.lineWidth = 1;
    c.setLineDash([]);
    // horizontal: 0%, +50%, -50%, +100%, -100%
    [0.1, 0.25, 0.5, 0.75, 0.9].forEach(f => {
      c.beginPath(); c.moveTo(0, H * f); c.lineTo(W, H * f); c.stroke();
    });
    // vertical grid every ~80px
    for (let x = 0; x < W; x += 80) {
      c.beginPath(); c.moveTo(x, 0); c.lineTo(x, H); c.stroke();
    }

    // ── Center line ──
    c.strokeStyle = 'rgba(0,245,196,0.2)';
    c.lineWidth = 1;
    c.setLineDash([4, 6]);
    c.beginPath(); c.moveTo(0, H/2); c.lineTo(W, H/2); c.stroke();
    c.setLineDash([]);

    // ── Amplitude labels ──
    c.fillStyle = 'rgba(74,106,133,0.8)';
    c.font = '9px Share Tech Mono';
    c.fillText('+1.0', 2, 10);
    c.fillText(' 0.0', 2, H/2 - 3);
    c.fillText('-1.0', 2, H - 3);

    // ── Waveform — use middle chunk of buffer for stable display ──
    // Simple trigger: find zero-crossing going upward near center
    const center = Math.floor(bufLen / 2);
    let triggerIdx = center;
    for (let i = center - 200; i < center + 200; i++) {
      if (timeData[i] <= 0 && timeData[i+1] > 0) { triggerIdx = i; break; }
    }

    const samplesPerPixel = Math.floor(bufLen / 4 / W) || 1;
    const startSample = triggerIdx;

    // Glow effect: draw thicker dim line first
    c.strokeStyle = 'rgba(0,245,196,0.15)';
    c.lineWidth = 5;
    c.beginPath();
    for (let x = 0; x < W; x++) {
      const si = startSample + x * samplesPerPixel;
      if (si >= bufLen) break;
      const v = timeData[si];
      const y = H/2 - v * (H/2 - 4);
      x === 0 ? c.moveTo(x, y) : c.lineTo(x, y);
    }
    c.stroke();

    // Sharp main line
    c.strokeStyle = 'rgba(0,245,196,0.95)';
    c.lineWidth = 1.8;
    c.beginPath();
    for (let x = 0; x < W; x++) {
      const si = startSample + x * samplesPerPixel;
      if (si >= bufLen) break;
      const v = timeData[si];
      const y = H/2 - v * (H/2 - 4);
      x === 0 ? c.moveTo(x, y) : c.lineTo(x, y);
    }
    c.stroke();

    // ── Stats ──
    let peak = 0, sum = 0, sumSq = 0;
    const n = Math.min(bufLen, 2048);
    for (let i = 0; i < n; i++) {
      const v = Math.abs(timeData[i]);
      if (v > peak) peak = v;
      sum += timeData[i];
      sumSq += timeData[i] * timeData[i];
    }
    const rms = Math.sqrt(sumSq / n);
    const dc = sum / n;
    document.getElementById('peakVal').textContent = peak.toFixed(3);
    document.getElementById('rmsVal').textContent = rms.toFixed(3);
    document.getElementById('dcVal').textContent = dc.toFixed(4);
  }
  draw();
}

// ── Init wave previews & slider gradients ──────────────────────
window.addEventListener('load', () => {
  drawWave(1);
  drawWave(2);
  updateFreq(1, 440);
  updateFreq(2, 1000);
});

window.addEventListener('resize', () => {
  drawWave(1);
  drawWave(2);
  if (micActive) { /* canvas redraws automatically */ }
  else clearViz();
});
</script>
