<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Visualizador de Micrófono</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10; --panel: #0d1520; --border: #1a2f4a;
    --acc: #facc15; --acc2: #00f5c4;
    --text: #c8dff0; --dim: #4a6a85;
    --glow: rgba(250,204,21,0.25); --glow2: rgba(0,245,196,0.2);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh; padding: 1rem; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(250,204,21,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(250,204,21,0.025) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }
  .container { position: relative; z-index: 1; max-width: 540px; margin: 0 auto; }

  h1 {
    font-family: 'Orbitron', sans-serif; font-weight: 900;
    font-size: clamp(1.1rem, 5vw, 1.5rem); letter-spacing: 0.15em;
    text-align: center; color: var(--acc); text-shadow: 0 0 20px var(--glow);
    padding: 1rem 0 0.3rem;
  }
  .subtitle {
    text-align: center; font-size: 0.65rem; color: var(--dim);
    letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 1.5rem;
  }

  /* Control bar */
  .ctrl-bar {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 0.9rem 1.2rem; margin-bottom: 1rem; gap: 1rem;
  }
  .ctrl-info { font-size: 0.65rem; color: var(--dim); letter-spacing: 0.1em; }
  .ctrl-info strong { color: var(--acc); font-family: 'Orbitron', sans-serif; font-size: 0.7rem; }

  .mic-btn {
    display: flex; align-items: center; gap: 9px;
    background: transparent; border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 20px; font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s; color: var(--dim);
    white-space: nowrap;
  }
  .mic-btn .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--dim); transition: all 0.2s; flex-shrink: 0;
  }
  .mic-btn.active {
    color: var(--acc); border-color: var(--acc); box-shadow: 0 0 14px var(--glow);
  }
  .mic-btn.active .dot {
    background: var(--acc); box-shadow: 0 0 8px var(--acc);
    animation: blink 1s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* Canvas panel */
  .viz-panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 1rem 1rem 0.8rem; margin-bottom: 1rem;
  }
  .viz-label {
    font-family: 'Orbitron', sans-serif; font-size: 0.65rem;
    letter-spacing: 0.2em; color: var(--dim); margin-bottom: 0.6rem;
    display: flex; justify-content: space-between; align-items: center;
  }
  .viz-label span { color: var(--acc2); }

  canvas#waveCanvas {
    width: 100%; height: 200px; display: block;
    border-radius: 4px; background: #030608;
    border: 1px solid var(--border);
  }

  /* Stats row */
  .stats {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 0.6rem; margin-bottom: 1rem;
  }
  .stat-box {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.7rem 0.8rem; text-align: center;
  }
  .stat-label { font-size: 0.55rem; color: var(--dim); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 3px; }
  .stat-val { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; color: var(--acc2); }

  /* Gain control */
  .gain-panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.9rem 1.2rem; margin-bottom: 1rem;
    display: flex; align-items: center; gap: 1rem;
  }
  .gain-label { font-size: 0.65rem; color: var(--dim); letter-spacing: 0.1em; white-space: nowrap; }
  .gain-label strong { color: var(--acc); font-family: 'Orbitron', sans-serif; }
  input#gainSlider {
    -webkit-appearance: none; appearance: none; flex: 1;
    height: 4px; border-radius: 2px; outline: none; cursor: pointer;
    background: linear-gradient(90deg, var(--acc) var(--gainPct, 0%), var(--border) var(--gainPct, 0%));
  }
  input#gainSlider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 20px; height: 20px;
    border-radius: 50%; background: var(--acc); color: var(--acc);
    border: 2px solid var(--bg); box-shadow: 0 0 8px var(--acc); cursor: pointer;
  }

  /* Time scale control */
  .time-panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.9rem 1.2rem; margin-bottom: 1rem;
    display: flex; align-items: center; gap: 1rem;
  }
  .time-label { font-size: 0.65rem; color: var(--dim); letter-spacing: 0.1em; white-space: nowrap; }
  .time-label strong { color: var(--acc2); font-family: 'Orbitron', sans-serif; }
  input#timeSlider {
    -webkit-appearance: none; appearance: none; flex: 1;
    height: 4px; border-radius: 2px; outline: none; cursor: pointer;
    background: linear-gradient(90deg, var(--acc2) var(--timePct, 0%), var(--border) var(--timePct, 0%));
  }
  input#timeSlider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 20px; height: 20px;
    border-radius: 50%; background: var(--acc2); color: var(--acc2);
    border: 2px solid var(--bg); box-shadow: 0 0 8px var(--acc2); cursor: pointer;
  }

  .nav-link {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 0.9rem; margin-bottom: 1rem; color: #00f5c4;
    font-size: 0.7rem; letter-spacing: 0.12em; text-decoration: none; transition: all 0.2s;
  }
  .nav-link:hover, .nav-link:active { border-color: #00f5c4; box-shadow: 0 0 10px var(--glow2); }

  .footer { text-align: center; font-size: 0.55rem; color: var(--dim); letter-spacing: 0.15em; padding: 0.5rem 0 1.5rem; opacity: 0.5; }
</style>
</head>
<body>
<div class="container">
  <h1>🎙 MIC WAVEFORM</h1>
  <p class="subtitle">Visualizador de Señal en Tiempo Real</p>

  <!-- Control -->
  <div class="ctrl-bar">
    <div class="ctrl-info">
      <strong>MICRÓFONO</strong><br>Amplitud vs. Tiempo
    </div>
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">
      <span class="dot"></span><span id="micLbl">ACTIVAR</span>
    </button>
  </div>

  <!-- Waveform canvas -->
  <div class="viz-panel">
    <div class="viz-label">
      <span>FORMA DE ONDA</span>
      <span id="sampleRateLabel">— Sa/s</span>
    </div>
    <canvas id="waveCanvas"></canvas>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-box">
      <div class="stat-label">Pico</div>
      <div class="stat-val" id="peakVal">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">RMS</div>
      <div class="stat-val" id="rmsVal">—</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">DC Offset</div>
      <div class="stat-val" id="dcVal">—</div>
    </div>
  </div>

  <!-- Gain -->
  <div class="gain-panel">
    <div class="gain-label">ZOOM V<br><strong id="gainLabel">1.0×</strong></div>
    <input type="range" id="gainSlider" min="1" max="20" value="1" step="0.5"
      oninput="updateGain(this.value)">
  </div>

  <!-- Time scale -->
  <div class="time-panel">
    <div class="time-label">ESCALA T<br><strong id="timeLabel">20 ms</strong></div>
    <input type="range" id="timeSlider" min="0" max="12" value="4" step="1"
      oninput="updateTimeScale(this.value)">
  </div>

  <!-- Back to generator -->
  <a class="nav-link" href="generador_audio.html">
    ← VOLVER AL GENERADOR DE SEÑALES
  </a>

  <div class="footer">MIC WAVEFORM VISUALIZER v2.0 · WEB AUDIO API</div>
</div>

<script>
let audioCtx = null;
let micStream = null;
let analyser = null;
let micSource = null;
let animId = null;
let micActive = false;
let zoomGain = 1.0;
let timeScale = 20; // ms to display

// Steps: 1, 2, 5, 10, 20, 50, 100, 200, 500, 1000, 2000, 5000, 10000 ms
const timeSteps = [1, 2, 5, 10, 20, 50, 100, 200, 500, 1000, 2000, 5000, 10000];

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function updateGain(val) {
  zoomGain = parseFloat(val);
  document.getElementById('gainLabel').textContent = zoomGain.toFixed(1) + '×';
  const pct = ((val - 1) / 19 * 100).toFixed(1);
  document.getElementById('gainSlider').style.setProperty('--gainPct', pct + '%');
}

function updateTimeScale(idx) {
  timeScale = timeSteps[parseInt(idx)];
  const label = timeScale >= 1000 ? (timeScale/1000).toFixed(timeScale%1000===0?0:1) + ' s' : timeScale + ' ms';
  document.getElementById('timeLabel').textContent = label;
  const pct = (parseInt(idx) / (timeSteps.length - 1) * 100).toFixed(1);
  document.getElementById('timeSlider').style.setProperty('--timePct', pct + '%');
}

async function toggleMic() {
  if (micActive) stopMic(); else await startMic();
}

async function startMic() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, video: false });
    const ac = getCtx();
    micSource = ac.createMediaStreamSource(micStream);
    analyser = ac.createAnalyser();
    analyser.fftSize = 16384; // max buffer for long time windows
    analyser.smoothingTimeConstant = 0.0;
    micSource.connect(analyser);
    micActive = true;
    document.getElementById('micBtn').classList.add('active');
    document.getElementById('micLbl').textContent = 'ON';
    document.getElementById('sampleRateLabel').textContent = (ac.sampleRate / 1000).toFixed(1) + ' kSa/s';
    drawLoop();
  } catch(e) {
    alert('No se pudo acceder al micrófono.\n' + e.message);
  }
}

function stopMic() {
  if (animId) cancelAnimationFrame(animId);
  if (micStream) micStream.getTracks().forEach(t => t.stop());
  if (micSource) micSource.disconnect();
  micStream = null; analyser = null; micSource = null;
  micActive = false; animId = null;
  document.getElementById('micBtn').classList.remove('active');
  document.getElementById('micLbl').textContent = 'ACTIVAR';
  document.getElementById('sampleRateLabel').textContent = '— Sa/s';
  clearCanvas();
  ['peakVal','rmsVal','dcVal'].forEach(id => document.getElementById(id).textContent = '—');
}

function clearCanvas() {
  const canvas = document.getElementById('waveCanvas');
  const c = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth || 500;
  canvas.height = 200;
  const W = canvas.width, H = canvas.height;
  c.fillStyle = '#030608';
  c.fillRect(0, 0, W, H);
  drawGrid(c, W, H);
  // flat center line
  c.strokeStyle = 'rgba(250,204,21,0.12)';
  c.lineWidth = 1; c.setLineDash([4,6]);
  c.beginPath(); c.moveTo(0, H/2); c.lineTo(W, H/2); c.stroke();
  c.setLineDash([]);
}

function drawGrid(c, W, H) {
  c.strokeStyle = 'rgba(26,47,74,0.5)';
  c.lineWidth = 1; c.setLineDash([]);
  [0.1, 0.25, 0.5, 0.75, 0.9].forEach(f => {
    c.beginPath(); c.moveTo(0, H*f); c.lineTo(W, H*f); c.stroke();
  });
  const cols = Math.floor(W / 80);
  for (let i = 1; i < cols; i++) {
    const x = (i / cols) * W;
    c.beginPath(); c.moveTo(x, 0); c.lineTo(x, H); c.stroke();
  }
}

function drawLoop() {
  const canvas = document.getElementById('waveCanvas');
  canvas.width = canvas.offsetWidth || 500;
  canvas.height = 200;
  const c = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const bufLen = analyser.fftSize;
  const timeData = new Float32Array(bufLen);

  function draw() {
    animId = requestAnimationFrame(draw);
    analyser.getFloatTimeDomainData(timeData);

    const ac = getCtx();
    const sampleRate = ac.sampleRate;
    // How many samples correspond to the chosen time window
    const samplesToShow = Math.min(bufLen, Math.round(sampleRate * timeScale / 1000));
    const samplesPerPixel = samplesToShow / W;

    // Background
    c.fillStyle = '#030608';
    c.fillRect(0, 0, W, H);

    // Grid (vertical lines = time divisions, 5 divisions)
    c.strokeStyle = 'rgba(26,47,74,0.5)';
    c.lineWidth = 1; c.setLineDash([]);
    const divs = 5;
    for (let i = 1; i < divs; i++) {
      const x = (i / divs) * W;
      c.beginPath(); c.moveTo(x, 0); c.lineTo(x, H); c.stroke();
    }
    [0.1, 0.25, 0.5, 0.75, 0.9].forEach(f => {
      c.beginPath(); c.moveTo(0, H*f); c.lineTo(W, H*f); c.stroke();
    });

    // Time axis labels at each division
    c.fillStyle = 'rgba(0,245,196,0.5)';
    c.font = '9px Share Tech Mono';
    for (let i = 0; i <= divs; i++) {
      const x = (i / divs) * W;
      const tMs = (i / divs) * timeScale;
      const tLabel = tMs >= 1000 ? (tMs/1000).toFixed(tMs%1000===0?0:2)+'s' : tMs.toFixed(tMs<1?2:0)+'ms';
      c.fillText(tLabel, x + 2, H - 4);
    }

    // Center dashed line
    c.strokeStyle = 'rgba(250,204,21,0.15)';
    c.lineWidth = 1; c.setLineDash([4,6]);
    c.beginPath(); c.moveTo(0, H/2); c.lineTo(W, H/2); c.stroke();
    c.setLineDash([]);

    // Amplitude labels
    c.fillStyle = 'rgba(74,106,133,0.9)';
    c.font = '9px Share Tech Mono';
    const zoom = zoomGain;
    c.fillText('+' + (1/zoom).toFixed(2), 3, 11);
    c.fillText('  0.00', 3, H/2 - 3);
    c.fillText('-' + (1/zoom).toFixed(2), 3, H - 14);

    // Trigger: zero-crossing upward within first half of buffer
    const searchLen = Math.min(bufLen / 2, samplesToShow);
    let triggerIdx = 0;
    for (let i = 1; i < searchLen; i++) {
      if (timeData[i-1] <= 0 && timeData[i] > 0) { triggerIdx = i; break; }
    }

    const halfH = H / 2;
    const scale = halfH * zoom - 4;

    // Glow
    c.strokeStyle = 'rgba(0,245,196,0.12)';
    c.lineWidth = 6; c.beginPath();
    for (let x = 0; x < W; x++) {
      const si = triggerIdx + Math.floor(x * samplesPerPixel);
      if (si >= bufLen) break;
      const y = halfH - timeData[si] * scale;
      x === 0 ? c.moveTo(x, y) : c.lineTo(x, y);
    }
    c.stroke();

    // Sharp line
    c.strokeStyle = 'rgba(0,245,196,0.95)';
    c.lineWidth = 1.8; c.beginPath();
    for (let x = 0; x < W; x++) {
      const si = triggerIdx + Math.floor(x * samplesPerPixel);
      if (si >= bufLen) break;
      const y = halfH - timeData[si] * scale;
      x === 0 ? c.moveTo(x, y) : c.lineTo(x, y);
    }
    c.stroke();

    // Stats
    let peak = 0, sum = 0, sumSq = 0;
    const n = Math.min(bufLen, samplesToShow);
    for (let i = 0; i < n; i++) {
      const v = timeData[i];
      if (Math.abs(v) > peak) peak = Math.abs(v);
      sum += v; sumSq += v * v;
    }
    const rms = Math.sqrt(sumSq / n);
    const dc = sum / n;
    document.getElementById('peakVal').textContent = peak.toFixed(3);
    document.getElementById('rmsVal').textContent = rms.toFixed(3);
    document.getElementById('dcVal').textContent = dc.toFixed(4);
  }
  draw();
}

window.addEventListener('load', () => { clearCanvas(); updateTimeScale(4); });
window.addEventListener('resize', () => { if (!micActive) clearCanvas(); });
</script>
</body>
</html>
