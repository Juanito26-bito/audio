<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Microphone Waveform Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10; --panel: #0d1520; --border: #1a2f4a;
    --acc: #facc15; --acc2: #00f5c4;
    --text: #c8dff0; --dim: #4a6a85;
    --glow: rgba(250,204,21,0.25); --glow2: rgba(0,245,196,0.2);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh; padding: 1rem; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(250,204,21,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(250,204,21,0.025) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }
  .container { position: relative; z-index: 1; max-width: 540px; margin: 0 auto; }
  h1 {
    font-family: 'Orbitron', sans-serif; font-weight: 900;
    font-size: clamp(1.1rem, 5vw, 1.5rem); letter-spacing: 0.15em;
    text-align: center; color: var(--acc); text-shadow: 0 0 20px var(--glow);
    padding: 1rem 0 0.3rem;
  }
  .subtitle { text-align: center; font-size: 0.65rem; color: var(--dim); letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 1.5rem; }

  .ctrl-bar { display: flex; align-items: center; justify-content: space-between; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 0.9rem 1.2rem; margin-bottom: 1rem; gap: 1rem; }
  .ctrl-info { font-size: 0.65rem; color: var(--dim); letter-spacing: 0.1em; }
  .ctrl-info strong { color: var(--acc); font-family: 'Orbitron', sans-serif; font-size: 0.7rem; }
  .mic-btn {
    display: flex; align-items: center; gap: 9px; background: transparent;
    border: 1px solid var(--border); border-radius: 6px; padding: 8px 20px;
    font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; letter-spacing: 0.1em;
    cursor: pointer; transition: all 0.2s; color: var(--dim); white-space: nowrap;
  }
  .mic-btn .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--dim); transition: all 0.2s; flex-shrink: 0; }
  .mic-btn.active { color: var(--acc); border-color: var(--acc); box-shadow: 0 0 14px var(--glow); }
  .mic-btn.active .dot { background: var(--acc); box-shadow: 0 0 8px var(--acc); animation: blink 1s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  .viz-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1rem 0.8rem; margin-bottom: 1rem; }
  .viz-label { font-family: 'Orbitron', sans-serif; font-size: 0.65rem; letter-spacing: 0.2em; color: var(--dim); margin-bottom: 0.6rem; display: flex; justify-content: space-between; align-items: center; }
  .viz-label span { color: var(--acc2); }
  canvas#waveCanvas { width: 100%; height: 200px; display: block; border-radius: 4px; background: #030608; border: 1px solid var(--border); }

  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.6rem; margin-bottom: 1rem; }
  .stat-box { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 0.7rem 0.8rem; text-align: center; }
  .stat-label { font-size: 0.55rem; color: var(--dim); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 3px; }
  .stat-val { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; color: var(--acc2); }

  .ctrl-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 0.9rem 1.2rem; margin-bottom: 1rem; display: flex; flex-direction: column; gap: 0.8rem; }
  .ctrl-row { display: flex; align-items: center; gap: 1rem; }
  .ctrl-lbl { font-size: 0.65rem; color: var(--dim); letter-spacing: 0.08em; white-space: nowrap; line-height: 1.5; }
  .ctrl-lbl strong { font-family: 'Orbitron', sans-serif; display: block; }
  .ctrl-lbl.tcolor strong { color: var(--acc2); }
  .ctrl-lbl.gcolor strong { color: var(--acc); }
  input.ctrl-slider { -webkit-appearance: none; appearance: none; flex: 1; height: 4px; border-radius: 2px; outline: none; cursor: pointer; }
  input.ctrl-slider.time-sl { background: linear-gradient(90deg, var(--acc2) var(--timePct, 31%), var(--border) var(--timePct, 31%)); }
  input.ctrl-slider.gain-sl { background: linear-gradient(90deg, var(--acc) var(--gainPct, 0%), var(--border) var(--gainPct, 0%)); }
  input.ctrl-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 2px solid var(--bg); box-shadow: 0 0 8px currentColor; }
  input.ctrl-slider.time-sl::-webkit-slider-thumb { background: var(--acc2); color: var(--acc2); }
  input.ctrl-slider.gain-sl::-webkit-slider-thumb { background: var(--acc); color: var(--acc); }

  /* Freeze button */
  .freeze-btn {
    width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
    background: transparent; border: 1px solid var(--border); border-radius: 5px;
    padding: 9px 0; font-family: 'Share Tech Mono', monospace; font-size: 0.7rem;
    letter-spacing: 0.12em; cursor: pointer; transition: all 0.2s; color: var(--dim);
  }
  .freeze-btn:hover { border-color: var(--acc2); color: var(--acc2); box-shadow: 0 0 8px var(--glow2); }
  .freeze-btn.frozen { color: #fb923c; border-color: #fb923c; box-shadow: 0 0 10px rgba(251,146,60,0.3); }

  /* Snapshot */
  .snapshot-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 0.9rem 1.2rem; margin-bottom: 1rem; }
  .snapshot-title { font-family: 'Orbitron', sans-serif; font-size: 0.65rem; letter-spacing: 0.18em; color: var(--dim); margin-bottom: 0.7rem; }
  .snapshot-row { display: flex; gap: 0.6rem; }
  .snap-btn {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px;
    background: transparent; border: 1px solid var(--border); border-radius: 5px;
    padding: 8px 10px; font-family: 'Share Tech Mono', monospace; font-size: 0.65rem;
    letter-spacing: 0.08em; cursor: pointer; transition: all 0.2s; color: var(--dim);
  }
  .snap-btn.csv-btn:hover { border-color: #a78bfa; color: #a78bfa; box-shadow: 0 0 8px rgba(167,139,250,0.3); }
  .snap-btn.png-btn:hover { border-color: var(--acc); color: var(--acc); box-shadow: 0 0 8px var(--glow); }

  .nav-link { display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 0.9rem; margin-bottom: 1rem; color: #00f5c4; font-size: 0.7rem; letter-spacing: 0.12em; text-decoration: none; transition: all 0.2s; }
  .nav-link:hover, .nav-link:active { border-color: #00f5c4; box-shadow: 0 0 10px var(--glow2); }
  .footer { text-align: center; font-size: 0.55rem; color: var(--dim); letter-spacing: 0.15em; padding: 0.5rem 0 1.5rem; opacity: 0.5; }
</style>
</head>
<body>
<div class="container">
  <h1>🎙 MIC WAVEFORM</h1>
  <p class="subtitle">Real-Time Signal Visualizer</p>

  <div class="ctrl-bar">
    <div class="ctrl-info"><strong>MICROPHONE</strong><br>Amplitude vs. Time</div>
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">
      <span class="dot"></span><span id="micLbl">ENABLE</span>
    </button>
  </div>

  <div class="viz-panel">
    <div class="viz-label">
      <span>WAVEFORM</span>
      <span id="sampleRateLabel">— Sa/s</span>
    </div>
    <canvas id="waveCanvas"></canvas>
  </div>

  <div class="stats">
    <div class="stat-box"><div class="stat-label">Peak</div><div class="stat-val" id="peakVal">—</div></div>
    <div class="stat-box"><div class="stat-label">RMS</div><div class="stat-val" id="rmsVal">—</div></div>
    <div class="stat-box"><div class="stat-label">DC Offset</div><div class="stat-val" id="dcVal">—</div></div>
  </div>

  <div class="ctrl-panel">
    <div class="ctrl-row">
      <div class="ctrl-lbl tcolor">TIME SCALE<br><strong id="timeLabel">20 ms</strong></div>
      <input type="range" class="ctrl-slider time-sl" id="timeSlider" min="0" max="12" value="4" step="1" oninput="updateTimeScale(this.value)">
    </div>
    <div class="ctrl-row">
      <div class="ctrl-lbl gcolor">V ZOOM<br><strong id="gainLabel">1.0×</strong></div>
      <input type="range" class="ctrl-slider gain-sl" id="gainSlider" min="1" max="20" value="1" step="0.5" oninput="updateGain(this.value)">
    </div>
    <button class="freeze-btn" id="freezeBtn" onclick="toggleFreeze()">
      <span id="freezeIco">⏸</span> <span id="freezeLbl">FREEZE</span>
    </button>
  </div>

  <!-- Save / Snapshot -->
  <div class="snapshot-panel">
    <div class="snapshot-title">💾 SAVE SNAPSHOT</div>
    <div class="snapshot-row">
      <button class="snap-btn csv-btn" onclick="saveSnapshot('csv')">📄 Save CSV</button>
      <button class="snap-btn png-btn" onclick="saveSnapshot('png')">🖼 Save PNG</button>
    </div>
  </div>

  <a class="nav-link" href="generador_audio.html">← BACK TO SIGNAL GENERATOR</a>
  <div class="footer">MIC WAVEFORM VISUALIZER v2.0 · WEB AUDIO API</div>
</div>

<script>
let audioCtx = null, micStream = null, analyser = null, micSource = null, animId = null, micActive = false;
let zoomGain = 1.0, timeScale = 20;
let lastTimeData = null;
let frozen = false;

function toggleFreeze() {
  if (!micActive) return;
  frozen = !frozen;
  const btn = document.getElementById('freezeBtn');
  btn.classList.toggle('frozen', frozen);
  document.getElementById('freezeIco').textContent = frozen ? '▶' : '⏸';
  document.getElementById('freezeLbl').textContent = frozen ? 'RESUME' : 'FREEZE';
}
const timeSteps = [1, 2, 5, 10, 20, 50, 100, 200, 500, 1000, 2000, 5000, 10000];

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function updateGain(val) {
  zoomGain = parseFloat(val);
  document.getElementById('gainLabel').textContent = zoomGain.toFixed(1) + '×';
  const pct = ((val-1)/19*100).toFixed(1);
  document.getElementById('gainSlider').style.setProperty('--gainPct', pct + '%');
}
function updateTimeScale(idx) {
  timeScale = timeSteps[parseInt(idx)];
  const label = timeScale >= 1000 ? (timeScale/1000).toFixed(timeScale%1000===0?0:1)+'s' : timeScale+'ms';
  document.getElementById('timeLabel').textContent = label;
  const pct = (parseInt(idx) / (timeSteps.length-1) * 100).toFixed(1);
  document.getElementById('timeSlider').style.setProperty('--timePct', pct + '%');
}
async function toggleMic() { if (micActive) stopMic(); else await startMic(); }
async function startMic() {
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, video: false });
    const ac = getCtx();
    micSource = ac.createMediaStreamSource(micStream);
    analyser = ac.createAnalyser();
    analyser.fftSize = 16384; analyser.smoothingTimeConstant = 0.0;
    micSource.connect(analyser);
    micActive = true;
    document.getElementById('micBtn').classList.add('active');
    document.getElementById('micLbl').textContent = 'ON';
    document.getElementById('sampleRateLabel').textContent = (ac.sampleRate/1000).toFixed(1) + ' kSa/s';
    drawLoop();
  } catch(e) { alert('Microphone access denied.\n' + e.message); }
}
function stopMic() {
  if (animId) cancelAnimationFrame(animId);
  if (micStream) micStream.getTracks().forEach(t => t.stop());
  if (micSource) micSource.disconnect();
  micStream = null; analyser = null; micSource = null; micActive = false; animId = null;
  frozen = false;
  document.getElementById('freezeBtn').classList.remove('frozen');
  document.getElementById('freezeIco').textContent = '⏸';
  document.getElementById('freezeLbl').textContent = 'FREEZE';
  document.getElementById('micBtn').classList.remove('active');
  document.getElementById('micLbl').textContent = 'ENABLE';
  document.getElementById('sampleRateLabel').textContent = '— Sa/s';
  clearCanvas();
  ['peakVal','rmsVal','dcVal'].forEach(id => document.getElementById(id).textContent = '—');
}
function clearCanvas() {
  const canvas = document.getElementById('waveCanvas');
  const c = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth || 500; canvas.height = 200;
  const W = canvas.width, H = canvas.height;
  c.fillStyle = '#030608'; c.fillRect(0, 0, W, H);
  c.strokeStyle = 'rgba(26,47,74,0.4)'; c.lineWidth = 1; c.setLineDash([]);
  [0.25,0.5,0.75].forEach(f => { c.beginPath(); c.moveTo(0,H*f); c.lineTo(W,H*f); c.stroke(); });
  c.strokeStyle = 'rgba(0,245,196,0.1)'; c.setLineDash([4,6]);
  c.beginPath(); c.moveTo(0,H/2); c.lineTo(W,H/2); c.stroke(); c.setLineDash([]);
}

function renderWave(c, W, H, timeData) {
  const ac = getCtx();
  const sampleRate = ac.sampleRate;
  const bufLen = timeData.length;
  const samplesToShow = Math.min(bufLen, Math.round(sampleRate * timeScale / 1000));
  const spp = samplesToShow / W;
  c.fillStyle = '#030608'; c.fillRect(0, 0, W, H);
  // Grid
  c.strokeStyle = 'rgba(26,47,74,0.5)'; c.lineWidth = 1; c.setLineDash([]);
  const divs = 5;
  for (let i=1; i<divs; i++) { const x=(i/divs)*W; c.beginPath(); c.moveTo(x,0); c.lineTo(x,H); c.stroke(); }
  [0.1,0.25,0.5,0.75,0.9].forEach(f => { c.beginPath(); c.moveTo(0,H*f); c.lineTo(W,H*f); c.stroke(); });
  // Time labels
  c.fillStyle = 'rgba(0,245,196,0.45)'; c.font = '9px Share Tech Mono';
  for (let i=0; i<=divs; i++) {
    const x=(i/divs)*W, tMs=(i/divs)*timeScale;
    const lbl = tMs>=1000 ? (tMs/1000).toFixed(tMs%1000===0?0:2)+'s' : tMs.toFixed(tMs<1?2:0)+'ms';
    c.fillText(lbl, x+2, H-4);
  }
  // Centre line
  c.strokeStyle = 'rgba(250,204,21,0.15)'; c.lineWidth = 1; c.setLineDash([4,6]);
  c.beginPath(); c.moveTo(0,H/2); c.lineTo(W,H/2); c.stroke(); c.setLineDash([]);
  // Amplitude labels
  c.fillStyle = 'rgba(74,106,133,0.8)'; c.font = '9px Share Tech Mono';
  c.fillText('+'+(1/zoomGain).toFixed(2), 3, 11);
  c.fillText('  0.00', 3, H/2-3);
  c.fillText('-'+(1/zoomGain).toFixed(2), 3, H-14);
  // Trigger
  const searchLen = Math.min(bufLen/2, samplesToShow);
  let trigIdx = 0;
  for (let i=1; i<searchLen; i++) { if (timeData[i-1]<=0 && timeData[i]>0) { trigIdx=i; break; } }
  const halfH=H/2, scale=halfH*zoomGain-4;
  // Glow
  c.strokeStyle='rgba(0,245,196,0.12)'; c.lineWidth=6; c.beginPath();
  for (let x=0; x<W; x++) { const si=trigIdx+Math.floor(x*spp); if(si>=bufLen) break; c.lineTo(x, halfH-timeData[si]*scale); }
  c.stroke();
  // Line
  c.strokeStyle='rgba(0,245,196,0.95)'; c.lineWidth=1.8; c.beginPath();
  for (let x=0; x<W; x++) { const si=trigIdx+Math.floor(x*spp); if(si>=bufLen) break; x===0?c.moveTo(x,halfH-timeData[si]*scale):c.lineTo(x,halfH-timeData[si]*scale); }
  c.stroke();
}

function drawLoop() {
  const canvas = document.getElementById('waveCanvas');
  canvas.width = canvas.offsetWidth || 500; canvas.height = 200;
  const c = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const bufLen = analyser.fftSize;
  const timeData = new Float32Array(bufLen);
  function draw() {
    animId = requestAnimationFrame(draw);
    if (frozen) return;
    analyser.getFloatTimeDomainData(timeData);
    lastTimeData = timeData.slice();
    renderWave(c, W, H, timeData);
    // Stats
    const ac = getCtx();
    const samplesToShow = Math.min(bufLen, Math.round(ac.sampleRate * timeScale / 1000));
    let peak=0, sum=0, sumSq=0;
    const n = Math.min(bufLen, samplesToShow);
    for (let i=0; i<n; i++) { const v=timeData[i]; if(Math.abs(v)>peak) peak=Math.abs(v); sum+=v; sumSq+=v*v; }
    document.getElementById('peakVal').textContent = peak.toFixed(3);
    document.getElementById('rmsVal').textContent = Math.sqrt(sumSq/n).toFixed(3);
    document.getElementById('dcVal').textContent = (sum/n).toFixed(4);
  }
  draw();
}

// ── Save snapshot ──────────────────────────────────────────────
function saveSnapshot(format) {
  if (!lastTimeData) { alert('No waveform data — enable the microphone first.'); return; }
  const ac = getCtx();
  const sampleRate = ac.sampleRate;
  const samplesToShow = Math.min(lastTimeData.length, Math.round(sampleRate * timeScale / 1000));
  const tsLabel = timeScale >= 1000 ? (timeScale/1000).toFixed(1)+'s' : timeScale+'ms';
  const timestamp = new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
  const filename = `waveform_${tsLabel}_${timestamp}`;

  if (format === 'csv') {
    let csv = 'sample_index,time_s,amplitude\n';
    for (let i=0; i<samplesToShow; i++) {
      csv += `${i},${(i/sampleRate).toFixed(8)},${lastTimeData[i].toFixed(8)}\n`;
    }
    triggerDownload(URL.createObjectURL(new Blob([csv],{type:'text/csv'})), filename+'.csv');

  } else if (format === 'png') {
    const W=900, H=300;
    const off = document.createElement('canvas');
    off.width=W; off.height=H;
    const c = off.getContext('2d');
    renderWave(c, W, H, lastTimeData);
    // Watermark
    c.fillStyle='rgba(74,106,133,0.7)'; c.font='11px monospace';
    c.fillText(`Time scale: ${tsLabel}  |  Sample rate: ${(sampleRate/1000).toFixed(1)} kHz  |  ${new Date().toLocaleString()}`, 8, H-8);
    off.toBlob(blob => triggerDownload(URL.createObjectURL(blob), filename+'.png'), 'image/png');
  }
}

function triggerDownload(url, filename) {
  const a = document.createElement('a');
  a.href=url; a.download=filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

window.addEventListener('load', () => { clearCanvas(); updateTimeScale(4); });
window.addEventListener('resize', () => { if (!micActive) clearCanvas(); });
</script>
</body>
</html>
