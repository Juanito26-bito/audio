<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Generador de Señales de Audio</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10; --panel: #0d1520; --border: #1a2f4a;
    --sig1: #00f5c4; --sig2: #ff5e5b; --mix: #a78bfa;
    --text: #c8dff0; --dim: #4a6a85;
    --glow1: rgba(0,245,196,0.25); --glow2: rgba(255,94,91,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh; padding: 1rem; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,245,196,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,196,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }
  .container { position: relative; z-index: 1; max-width: 500px; margin: 0 auto; }
  h1 {
    font-family: 'Orbitron', sans-serif; font-weight: 900;
    font-size: clamp(1.1rem, 5vw, 1.6rem); letter-spacing: 0.15em;
    text-align: center; color: var(--sig1); text-shadow: 0 0 20px var(--glow1);
    padding: 1rem 0 0.3rem;
  }
  .subtitle {
    text-align: center; font-size: 0.65rem; color: var(--dim);
    letter-spacing: 0.25em; text-transform: uppercase; margin-bottom: 1.5rem;
  }
  .signal-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 1.2rem; margin-bottom: 1rem;
    position: relative; overflow: hidden;
  }
  .signal-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  }
  .signal-card.s1::before { background: linear-gradient(90deg, transparent, var(--sig1), transparent); }
  .signal-card.s2::before { background: linear-gradient(90deg, transparent, var(--sig2), transparent); }
  .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .signal-label { font-family: 'Orbitron', sans-serif; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.2em; }
  .s1 .signal-label { color: var(--sig1); }
  .s2 .signal-label { color: var(--sig2); }
  .freq-display { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; font-weight: 700; letter-spacing: 0.05em; }
  .s1 .freq-display { color: var(--sig1); text-shadow: 0 0 15px var(--glow1); }
  .s2 .freq-display { color: var(--sig2); text-shadow: 0 0 15px var(--glow2); }
  .freq-unit { font-size: 0.65rem; color: var(--dim); margin-left: 2px; }

  .slider-wrap { position: relative; margin: 0.5rem 0; }
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px; border-radius: 2px; outline: none; cursor: pointer;
  }
  .s1 input[type=range] { background: linear-gradient(90deg, var(--sig1) var(--pct1, 22%), var(--border) var(--pct1, 22%)); }
  .s2 input[type=range] { background: linear-gradient(90deg, var(--sig2) var(--pct2, 50%), var(--border) var(--pct2, 50%)); }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 22px; height: 22px;
    border-radius: 50%; cursor: pointer; border: 2px solid var(--bg); box-shadow: 0 0 10px currentColor;
  }
  .s1 input[type=range]::-webkit-slider-thumb { background: var(--sig1); color: var(--sig1); }
  .s2 input[type=range]::-webkit-slider-thumb { background: var(--sig2); color: var(--sig2); }

  .slider-ticks {
    display: flex; justify-content: space-between;
    font-size: 0.5rem; color: var(--dim); margin-top: 4px; padding: 0 2px;
  }

  .toggle-btn {
    display: flex; align-items: center; gap: 8px;
    background: transparent; border: 1px solid var(--border); border-radius: 4px;
    padding: 6px 14px; font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s; color: var(--dim);
  }
  .toggle-btn .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--dim); transition: all 0.2s; flex-shrink: 0;
  }
  .s1 .toggle-btn.active { color: var(--sig1); border-color: var(--sig1); box-shadow: 0 0 10px var(--glow1); }
  .s1 .toggle-btn.active .dot { background: var(--sig1); box-shadow: 0 0 8px var(--sig1); }
  .s2 .toggle-btn.active { color: var(--sig2); border-color: var(--sig2); box-shadow: 0 0 10px var(--glow2); }
  .s2 .toggle-btn.active .dot { background: var(--sig2); box-shadow: 0 0 8px var(--sig2); }

  .freq-input-wrap { display: flex; align-items: center; gap: 6px; margin-top: 0.7rem; }
  .freq-input {
    background: #050a0e; border: 1px solid var(--border); border-radius: 4px;
    color: var(--text); font-family: 'Orbitron', sans-serif; font-size: 0.9rem;
    width: 88px; padding: 5px 8px; text-align: right; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s; -moz-appearance: textfield;
  }
  .freq-input::-webkit-inner-spin-button, .freq-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .s1 .freq-input:focus { border-color: var(--sig1); box-shadow: 0 0 8px var(--glow1); }
  .s2 .freq-input:focus { border-color: var(--sig2); box-shadow: 0 0 8px var(--glow2); }
  .freq-input-unit { font-size: 0.65rem; color: var(--dim); letter-spacing: 0.1em; }
  .freq-input-hint { font-size: 0.55rem; color: var(--dim); margin-left: auto; }

  canvas.wave-preview { width: 100%; height: 30px; display: block; border-radius: 2px; margin-top: 0.6rem; opacity: 0.65; }

  .mix-panel {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 1rem 1.2rem; margin-bottom: 1rem;
    display: flex; align-items: center; justify-content: space-between; gap: 1rem;
  }
  .mix-label { font-family: 'Orbitron', sans-serif; font-size: 0.7rem; color: var(--mix); letter-spacing: 0.15em; }
  .mix-btn {
    display: flex; align-items: center; gap: 8px; background: transparent;
    border: 1px solid rgba(167,139,250,0.3); border-radius: 4px; padding: 8px 18px;
    font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; letter-spacing: 0.1em;
    cursor: pointer; transition: all 0.2s; color: var(--dim);
  }
  .mix-btn .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); transition: all 0.2s; flex-shrink: 0; }
  .mix-btn.active { color: var(--mix); border-color: var(--mix); box-shadow: 0 0 12px rgba(167,139,250,0.3); }
  .mix-btn.active .dot { background: var(--mix); box-shadow: 0 0 8px var(--mix); }

  .nav-link {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 0.9rem; margin-bottom: 1rem; color: #facc15;
    font-size: 0.7rem; letter-spacing: 0.12em; text-decoration: none; transition: all 0.2s;
  }
  .nav-link:hover, .nav-link:active { border-color: #facc15; box-shadow: 0 0 10px rgba(250,204,21,0.2); }

  .footer { text-align: center; font-size: 0.55rem; color: var(--dim); letter-spacing: 0.15em; padding: 0.5rem 0 1.5rem; opacity: 0.5; }
</style>
</head>
<body>
<div class="container">
  <h1>AUDIO SIGNAL GEN</h1>
  <p class="subtitle">Dual Sine Wave Generator · 0 – 2000 Hz</p>

  <!-- Signal A -->
  <div class="signal-card s1">
    <div class="card-header">
      <div>
        <div class="signal-label">SEÑAL — A</div>
        <div class="freq-display"><span id="f1val">440</span><span class="freq-unit">Hz</span></div>
      </div>
      <button class="toggle-btn" id="btn1" onclick="toggleSignal(1)">
        <span class="dot"></span><span id="lbl1">OFF</span>
      </button>
    </div>
    <div class="slider-wrap">
      <input type="range" id="slider1" min="0" max="2000" value="440" step="1"
        oninput="updateFreq(1, this.value)">
    </div>
    <div class="slider-ticks">
      <span>0</span><span>250</span><span>500</span><span>750</span><span>1k</span><span>1250</span><span>1500</span><span>1750</span><span>2k</span>
    </div>
    <div class="freq-input-wrap">
      <input class="freq-input" id="input1" type="number" min="0" max="2000" value="440"
        oninput="setFreqFromInput(1)" onchange="setFreqFromInput(1)">
      <span class="freq-input-unit">Hz</span>
      <span class="freq-input-hint">0 – 2000 Hz</span>
    </div>
    <canvas class="wave-preview" id="wave1"></canvas>
  </div>

  <!-- Signal B -->
  <div class="signal-card s2">
    <div class="card-header">
      <div>
        <div class="signal-label">SEÑAL — B</div>
        <div class="freq-display"><span id="f2val">1000</span><span class="freq-unit">Hz</span></div>
      </div>
      <button class="toggle-btn" id="btn2" onclick="toggleSignal(2)">
        <span class="dot"></span><span id="lbl2">OFF</span>
      </button>
    </div>
    <div class="slider-wrap">
      <input type="range" id="slider2" min="0" max="2000" value="1000" step="1"
        oninput="updateFreq(2, this.value)">
    </div>
    <div class="slider-ticks">
      <span>0</span><span>250</span><span>500</span><span>750</span><span>1k</span><span>1250</span><span>1500</span><span>1750</span><span>2k</span>
    </div>
    <div class="freq-input-wrap">
      <input class="freq-input" id="input2" type="number" min="0" max="2000" value="1000"
        oninput="setFreqFromInput(2)" onchange="setFreqFromInput(2)">
      <span class="freq-input-unit">Hz</span>
      <span class="freq-input-hint">0 – 2000 Hz</span>
    </div>
    <canvas class="wave-preview" id="wave2"></canvas>
  </div>

  <!-- Mix -->
  <div class="mix-panel">
    <div>
      <div class="mix-label">MIX A + B</div>
      <div style="font-size:0.6rem;color:var(--dim);margin-top:3px;">Reproduce ambas señales</div>
    </div>
    <button class="mix-btn" id="btnMix" onclick="toggleMix()">
      <span class="dot"></span><span id="lblMix">OFF</span>
    </button>
  </div>

  <!-- Nav to mic page -->
  <a class="nav-link" href="microfono.html">
    🎙&nbsp; ABRIR VISUALIZADOR DE MICRÓFONO →
  </a>

  <div class="footer">AUDIO SIGNAL GENERATOR v2.0 · WEB AUDIO API</div>
</div>

<script>
let audioCtx;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

const osc = { 1: null, 2: null };
const gainNode = { 1: null, 2: null };
const active = { 1: false, 2: false, mix: false };
let freq = { 1: 440, 2: 1000 };

function createOsc(n) {
  const ac = getCtx();
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = 'sine';
  o.frequency.value = Math.max(1, freq[n]);
  g.gain.value = 0.4;
  o.connect(g); g.connect(ac.destination);
  o.start();
  osc[n] = o; gainNode[n] = g;
}

function destroyOsc(n) {
  if (osc[n]) { try { osc[n].stop(); } catch(e){} osc[n] = null; gainNode[n] = null; }
}

function toggleSignal(n) {
  if (active.mix) {
    active.mix = false; updateMixBtn();
    [1,2].forEach(k => { if (active[k]) destroyOsc(k); active[k] = false; });
  }
  active[n] = !active[n];
  if (active[n]) createOsc(n); else destroyOsc(n);
  document.getElementById('btn' + n).classList.toggle('active', active[n]);
  document.getElementById('lbl' + n).textContent = active[n] ? 'ON' : 'OFF';
}

function toggleMix() {
  active.mix = !active.mix;
  if (active.mix) {
    [1,2].forEach(n => { if (active[n]) { destroyOsc(n); active[n] = false; } });
    ['btn1','lbl1','btn2','lbl2'].forEach((id,i) => {
      const el = document.getElementById(id);
      if (i%2===0) el.classList.remove('active'); else el.textContent = 'OFF';
    });
    createOsc(1); active[1] = true;
    createOsc(2); active[2] = true;
  } else {
    [1,2].forEach(n => { destroyOsc(n); active[n] = false; });
  }
  updateMixBtn();
}

function updateMixBtn() {
  document.getElementById('btnMix').classList.toggle('active', active.mix);
  document.getElementById('lblMix').textContent = active.mix ? 'ON' : 'OFF';
}

function setFreqFromInput(n) {
  const input = document.getElementById('input' + n);
  let val = parseInt(input.value);
  if (isNaN(val)) return;
  val = Math.max(0, Math.min(2000, val));
  document.getElementById('slider' + n).value = val;
  updateFreq(n, val);
}

function updateFreq(n, val) {
  val = parseInt(val);
  freq[n] = val;
  document.getElementById('f' + n + 'val').textContent = val;
  document.getElementById('input' + n).value = val;
  const pct = (val / 2000 * 100).toFixed(1);
  document.getElementById('slider' + n).style.setProperty('--pct' + n, pct + '%');
  if (osc[n]) osc[n].frequency.setTargetAtTime(Math.max(1, val), getCtx().currentTime, 0.01);
  drawWave(n);
}

function drawWave(n) {
  const canvas = document.getElementById('wave' + n);
  const c = canvas.getContext('2d');
  const W = canvas.offsetWidth || 300;
  canvas.width = W; canvas.height = 30;
  c.clearRect(0, 0, W, 30);
  const color = n === 1 ? '#00f5c4' : '#ff5e5b';
  c.strokeStyle = color; c.lineWidth = 1.5; c.globalAlpha = 0.8;
  if (freq[n] === 0) {
    c.globalAlpha = 0.4;
    c.beginPath(); c.moveTo(0, 15); c.lineTo(W, 15); c.stroke();
    return;
  }
  c.beginPath();
  const cycles = Math.min(10, Math.max(0.5, freq[n] / 100));
  for (let x = 0; x < W; x++) {
    const t = (x / W) * cycles * Math.PI * 2;
    const y = 15 + Math.sin(t) * 11;
    x === 0 ? c.moveTo(x, y) : c.lineTo(x, y);
  }
  c.stroke();
}

window.addEventListener('load', () => { updateFreq(1, 440); updateFreq(2, 1000); });
window.addEventListener('resize', () => { drawWave(1); drawWave(2); });
</script>
</body>
</html>
